name: 🌍 能源新闻自动监控

on:
  schedule:
    - cron: '45 0 * * *'
  workflow_dispatch:

concurrency:
  group: energy-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: ⚙️ Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: 🚀 Run monitor
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          JINA_KEY: ${{ secrets.JINA_KEY }}
        run: python src/monitor.py
      
      - name: 📤 Commit and push reports
        run: |
          git add *.md *.html history.txt || true
          git commit -m "📊 Auto-generated report $(date -u +%Y-%m-%d)" || true
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || true
      
      - name: 📦 Upload reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: energy-reports-${{ github.run_number }}
          path: |
            *.md
            *.html
            history.txt
          retention-days: 30